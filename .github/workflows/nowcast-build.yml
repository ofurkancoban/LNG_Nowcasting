name: Nowcast Build

on:
  workflow_run:
    workflows: ["Ingest ALSI"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  ingest-alsi:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/ingest-alsi.yml
    secrets: inherit

  build-and-backtest:
    needs: ingest-alsi
    # Also runs when triggered by the "Ingest ALSI" workflow_run event
    # completing successfully, in addition to the workflow_dispatch path
    # above (the needs: dependency only applies to the dispatch path,
    # since workflow_run jobs cannot depend on a job in this same file).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run data quality checks and full test suite
        run: uv run pytest tests/

      - name: Run orchestrator (ingestion -> nowcast -> backtest)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          uv run python -m lng.pipeline.orchestrate \
            --source motherduck \
            --run-id "${{ github.run_id }}" \
            --motherduck
        # Reads raw AIS/ALSI directly from MotherDuck (dual-written by the
        # VPS ingesters and the Ingest ALSI workflow, see ADR 0001 Decision
        # 5) instead of needing an SSH-based file sync from the VPS's local
        # disk, which GitHub Actions runners have no access to. --motherduck
        # appends this run's metrics back to MotherDuck for the dashboard.

      - name: Build dashboard
        working-directory: dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          EVIDENCE_SOURCE__marts_backtest__token: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          npm install
          npm run build

      - name: Deploy dashboard to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/build

  deploy-pages:
    needs: build-and-backtest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
