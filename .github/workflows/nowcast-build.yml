name: Nowcast Build

on:
  workflow_run:
    workflows: ["Ingest ALSI"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  ingest-alsi:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/ingest-alsi.yml
    secrets: inherit

  build-and-backtest:
    needs: ingest-alsi
    # Also runs when triggered by the "Ingest ALSI" workflow_run event
    # completing successfully, in addition to the workflow_dispatch path
    # above (the needs: dependency only applies to the dispatch path,
    # since workflow_run jobs cannot depend on a job in this same file).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run data quality checks and full test suite
        run: uv run pytest tests/

      - name: Download raw ALSI snapshot from the triggering ingest run
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: alsi-raw-snapshot-${{ github.event.workflow_run.id }}
          path: raw
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Run orchestrator (ingestion -> nowcast -> backtest)
        run: |
          uv run python -m lng.pipeline.orchestrate \
            --raw-ais-dir raw \
            --alsi-dir raw \
            --out marts/backtest \
            --run-id "${{ github.run_id }}"
        # This genuinely runs src/lng/pipeline/orchestrate.py end to end
        # (added after M7, see docs/progress/M7.md's follow-up note). It
        # will legitimately exit 1 with "No backtest folds produced" until
        # raw AIS data from the VPS ingester (deploy/README.md) is synced
        # into this workflow by some future step; that sync mechanism does
        # not exist yet and is flagged here rather than silently assumed.

      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm install
          npm run build
