name: Ingest ALSI

# GIE ALSI publishes new data once per gas day at 19:30 CET, with a second
# pass at 23:00 CET for late reporters (docs/data_sources.md). 22:15 UTC
# covers both the 19:30 CET (summer, UTC+2) and 23:00 CET (winter, UTC+1)
# publication windows with margin. Polling more often is pointless, since
# ALSI itself has already published for the day by then.
on:
  schedule:
    - cron: "15 22 * * *"
  workflow_dispatch: {}
  workflow_call: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run data quality checks
        run: uv run pytest tests/test_quality_checks.py tests/test_ingest_alsi.py

      - name: Ingest ALSI facility reports
        env:
          ALSI_API_KEY: ${{ secrets.ALSI_API_KEY }}
        run: uv run python -m lng.ingest.alsi --type eu --out raw

      - name: Upload raw ALSI snapshot
        uses: actions/upload-artifact@v4
        with:
          name: alsi-raw-snapshot-${{ github.run_id }}
          path: raw/source=alsi/
          retention-days: 90
